# Z-Player Application Configuration
server.port=8080
spring.application.name=z-player

# JPA/Hibernate
spring.datasource.url=jdbc:postgresql://localhost:5432/zchess_im
spring.datasource.username=chess
spring.datasource.password=chess
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# WebSocket
spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=65536

# Management endpoints
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always

# Logging
logging.level.com.isahl.chess.player=INFO
logging.level.org.springframework.web.socket=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
