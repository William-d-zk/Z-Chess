# ==================== MQTT v5.0 Configuration ====================
# Config prefix: z.chess.mqtt.v5

# -------------------- Feature Toggles --------------------
# Enable MQTT v5 support
z.chess.mqtt.v5.enabled=true
# Enable topic alias
z.chess.mqtt.v5.topic-alias-enabled=true
# Enable message expiry
z.chess.mqtt.v5.message-expiry-enabled=true
# Enable flow control
z.chess.mqtt.v5.flow-control-enabled=true
# Enable shared subscription
z.chess.mqtt.v5.shared-subscription-enabled=true
# Enable enhanced authentication
z.chess.mqtt.v5.enhanced-auth-enabled=false

# -------------------- Session Configuration --------------------
# Default session expiry interval in seconds, 0 means session ends when connection disconnects
z.chess.mqtt.v5.default-session-expiry-interval=0
# Max session expiry interval in seconds, default 7 days
z.chess.mqtt.v5.max-session-expiry-interval=604800

# -------------------- Flow Control Configuration --------------------
# Server receive maximum, limits the number of concurrent QoS 1/2 messages
z.chess.mqtt.v5.server-receive-maximum=65535
# Client receive maximum, 0 means no limit for client
z.chess.mqtt.v5.client-receive-maximum=0

# -------------------- Topic Alias Configuration --------------------
# Server topic alias maximum
z.chess.mqtt.v5.server-topic-alias-maximum=65535
# Client topic alias maximum, 0 means does not accept topic alias from client
z.chess.mqtt.v5.client-topic-alias-maximum=0

# -------------------- Packet Size Configuration --------------------
# Maximum packet size in bytes, 0 means unlimited, default ~256MB
z.chess.mqtt.v5.maximum-packet-size=268435455
# Default maximum packet size (when client does not specify), default 64KB
z.chess.mqtt.v5.default-maximum-packet-size=65536

# -------------------- Feature Support Configuration --------------------
# Whether retain messages are available
z.chess.mqtt.v5.retain-available=true
# Maximum QoS level (0/1/2)
z.chess.mqtt.v5.maximum-qos=2
# Whether wildcard subscription is available
z.chess.mqtt.v5.wildcard-subscription-available=true
# Whether subscription identifier is available
z.chess.mqtt.v5.subscription-identifier-available=true
# Whether shared subscription is available
z.chess.mqtt.v5.shared-subscription-available=true

# -------------------- Will Configuration --------------------
# Max will delay interval in seconds, default 1 day
z.chess.mqtt.v5.max-will-delay-interval=86400
# Default will delay interval in seconds
z.chess.mqtt.v5.default-will-delay-interval=0

# -------------------- Enhanced Auth Configuration --------------------
# Authentication timeout in seconds
z.chess.mqtt.v5.auth-timeout-seconds=60
# Whether re-authentication is allowed
z.chess.mqtt.v5.reauthentication-allowed=true

# -------------------- Performance Tuning Configuration --------------------
# Topic alias cache size, default 1000
z.chess.mqtt.v5.topic-alias-cache-size=1000
# Message expiry check interval in milliseconds, default 1000ms
z.chess.mqtt.v5.message-expiry-check-interval=1000
# Max pending messages (flow control), default 1000
z.chess.mqtt.v5.max-pending-messages=1000
