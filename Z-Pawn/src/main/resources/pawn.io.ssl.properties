# ==========================================
# Z-Chess TLS/SSL 配置 for zchat 协议
# ==========================================

# --------------------
# 服务端 TLS 配置 (Provider)
# --------------------
# 是否启用 TLS
z.chess.pawn.io.provider.ssl.enabled=${SSL_ENABLED:false}

# 服务端密钥库路径 (PKCS12 格式)
z.chess.pawn.io.provider.ssl.key-store-path=cert/server.p12

# ⚠️ 安全警告: 使用环境变量设置密钥库密码，切勿使用默认密码
z.chess.pawn.io.provider.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:}

# 服务端信任库路径 (用于客户端证书验证，可选)
z.chess.pawn.io.provider.ssl.trust-store-path=cert/trust.p12

# ⚠️ 安全警告: 使用环境变量设置信任库密码
z.chess.pawn.io.provider.ssl.trust-store-password=${SSL_TRUSTSTORE_PASSWORD:}

# 是否要求客户端证书 (双向 TLS)
# 生产环境建议启用 (设置为 true)
z.chess.pawn.io.provider.ssl.client-auth=${SSL_CLIENT_AUTH:false}

# 支持的 TLS 协议版本
z.chess.pawn.io.provider.ssl.protocol=TLSv1.2

# 启用的加密套件 (可选，默认使用 JVM 默认)
# z.chess.pawn.io.provider.ssl.ciphers=TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256

# --------------------
# 客户端 TLS 配置 (Consumer)
# --------------------
# 是否启用 TLS
z.chess.pawn.io.consumer.ssl.enabled=false

# 客户端密钥库路径 (用于客户端证书认证，可选)
z.chess.pawn.io.consumer.ssl.key-store-path=cert/client.p12

# ⚠️ 安全警告: 使用环境变量设置密钥库密码
z.chess.pawn.io.consumer.ssl.key-store-password=${CONSUMER_KEYSTORE_PASSWORD:}

# 客户端信任库路径 (用于验证服务端证书)
z.chess.pawn.io.consumer.ssl.trust-store-path=cert/trust.p12

# ⚠️ 安全警告: 使用环境变量设置信任库密码
z.chess.pawn.io.consumer.ssl.trust-store-password=${CONSUMER_TRUSTSTORE_PASSWORD:}

# 是否验证服务端证书主机名
z.chess.pawn.io.consumer.ssl.verify-hostname=true

# 支持的 TLS 协议版本
z.chess.pawn.io.consumer.ssl.protocol=TLSv1.2

# --------------------
# 集群内部 TLS 配置 (Cluster)
# --------------------
# 是否启用 TLS (Raft 节点间通信)
z.chess.pawn.io.cluster.ssl.enabled=false

# 集群节点密钥库路径
z.chess.pawn.io.cluster.ssl.key-store-path=cert/cluster.p12

# ⚠️ 安全警告: 使用环境变量设置密钥库密码
z.chess.pawn.io.cluster.ssl.key-store-password=${CLUSTER_KEYSTORE_PASSWORD:}

# 集群节点信任库路径
z.chess.pawn.io.cluster.ssl.trust-store-path=cert/cluster-trust.p12

# ⚠️ 安全警告: 使用环境变量设置信任库密码
z.chess.pawn.io.cluster.ssl.trust-store-password=${CLUSTER_TRUSTSTORE_PASSWORD:}

# 是否要求双向认证
z.chess.pawn.io.cluster.ssl.client-auth=true

# --------------------
# 内部服务 TLS 配置 (Internal)
# --------------------
z.chess.pawn.io.internal.ssl.enabled=false
z.chess.pawn.io.internal.ssl.key-store-path=cert/internal.p12
# ⚠️ 安全警告: 使用环境变量设置密钥库密码
z.chess.pawn.io.internal.ssl.key-store-password=${INTERNAL_KEYSTORE_PASSWORD:}
z.chess.pawn.io.internal.ssl.trust-store-path=cert/internal-trust.p12
# ⚠️ 安全警告: 使用环境变量设置信任库密码
z.chess.pawn.io.internal.ssl.trust-store-password=${INTERNAL_TRUSTSTORE_PASSWORD:}

# --------------------
# TLS 缓冲区配置
# --------------------
# TLS 数据包缓冲区大小 (默认 16KB)
z.chess.pawn.io.ssl.packet-buffer-size=16KB

# TLS 应用数据缓冲区大小 (默认 16KB)
z.chess.pawn.io.ssl.app-buffer-size=16KB

# --------------------
# TLS 会话配置
# --------------------
# 是否启用会话恢复
z.chess.pawn.io.ssl.enable-session-creation=true

# 会话超时时间 (秒)
z.chess.pawn.io.ssl.session-timeout=300
