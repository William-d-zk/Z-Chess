name: PR Check

on:
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  pr-check:
    name: Pull Request Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout PR Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'liberica'
        cache: 'maven'
    
    - name: Validate PR Title
      uses: amannn/action-semantic-pull-request@v5
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        types: |
          feat
          fix
          docs
          style
          refactor
          perf
          test
          build
          ci
          chore
          revert
        requireScope: false
    
    - name: Check Code Format
      run: |
        mvn formatter:validate -B -V || echo "⚠️ 代码格式检查失败，请运行 'mvn formatter:format' 修复"
    
    - name: Compile Check
      run: mvn clean compile -DskipTests -B -V
    
    - name: Run Tests
      run: mvn test -B -V
    
    - name: Check Test Coverage
      run: |
        mvn jacoco:report -B -V || true
        echo "📊 测试覆盖率报告已生成"
    
    - name: Comment PR
      uses: actions/github-script@v7
      if: always()
      with:
        script: |
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          
          const botComment = comments.find(comment => {
            return comment.user.type === 'Bot' && comment.body.includes('Z-Chess PR Check')
          });
          
          const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
          const body = `## ${status} Z-Chess PR Check
          
          | 检查项 | 状态 |
          |--------|------|
          | 代码编译 | ${{ job.status }} |
          | 单元测试 | ${{ job.status }} |
          | 代码格式 | ${{ job.status }} |
          
          > 提交: ${{ github.event.pull_request.head.sha }}
          > 作者: @${{ github.event.pull_request.user.login }}
          `;
          
          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: body
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
          }
