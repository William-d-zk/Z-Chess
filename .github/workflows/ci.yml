name: Z-Chess CI

on:
  push:
    branches: [ main, develop, 'release/*' ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'liberica'

jobs:
  # ==================== 编译与单元测试 ====================
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: ${{ env.JAVA_DISTRIBUTION }}
        cache: 'maven'
    
    - name: Cache Maven Dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-
    
    - name: Compile
      run: mvn clean compile -DskipTests -B -V
      
    - name: Run Unit Tests
      run: mvn test -B -V
      
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: '**/target/surefire-reports/*.xml'
        retention-days: 7

  # ==================== 代码质量检查 ====================
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: ${{ env.JAVA_DISTRIBUTION }}
        cache: 'maven'
    
    - name: Check Code Style
      run: mvn checkstyle:check -B -V || true
      
    - name: SpotBugs Security Analysis
      run: mvn spotbugs:check -B -V || true
      
    - name: Generate Quality Report
      run: |
        echo "## 代码质量检查报告" > quality-report.md
        echo "- 检查时间: $(date)" >> quality-report.md
        echo "- 提交: ${{ github.sha }}" >> quality-report.md
        echo "- 分支: ${{ github.ref_name }}" >> quality-report.md
    
    - name: Upload Quality Report
      uses: actions/upload-artifact@v4
      with:
        name: quality-report
        path: quality-report.md
        retention-days: 30

  # ==================== 集成测试 ====================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: chess
          POSTGRES_PASSWORD: chess
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: ${{ env.JAVA_DISTRIBUTION }}
        cache: 'maven'
    
    - name: Wait for PostgreSQL
      run: |
        for i in {1..10}; do
          pg_isready -h localhost -p 5432 && break
          sleep 2
        done
    
    - name: Run Integration Tests
      run: mvn verify -P integration-test -DskipUnitTests -B -V
      env:
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
        POSTGRES_USER: chess
        POSTGRES_PASSWORD: chess
        POSTGRES_DB: test

  # ==================== Docker 构建 ====================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./scripts/aarch64/Dockerfile
        push: false
        tags: z-chess:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64

  # ==================== 安全扫描 ====================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: ${{ env.JAVA_DISTRIBUTION }}
        cache: 'maven'
    
    - name: OWASP Dependency Check
      run: mvn org.owasp:dependency-check-maven:check -B -V || true
      
    - name: Upload Security Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-report
        path: target/dependency-check-report.html
        retention-days: 30

  # ==================== 发布构建 ====================
  release:
    name: Release Build
    runs-on: ubuntu-latest
    needs: [build, code-quality, integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: ${{ env.JAVA_DISTRIBUTION }}
        cache: 'maven'
        server-id: github
        server-username: GITHUB_ACTOR
        server-password: GITHUB_TOKEN
    
    - name: Build Release Package
      run: mvn clean package -DskipTests -B -V
      
    - name: Upload Release Artifact
      uses: actions/upload-artifact@v4
      with:
        name: z-chess-release
        path: '**/target/*.jar'
        retention-days: 30
