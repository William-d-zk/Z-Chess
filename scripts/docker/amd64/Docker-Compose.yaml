# ============================================================================
# Z-Chess Docker Compose - AMD64 (x86_64) 版本
#
# 升级说明：
# - PostgreSQL 17.2 (升级自旧版本)
# - Alpine Linux 3.20 (内核 6.6.x)
# - 优化网络和存储配置
# ============================================================================


services:
  # ==========================================================================
  # PostgreSQL 17 数据库服务
  # ==========================================================================
  db-pg:
    build:
      context: ../postgres17
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    image: isahl/postgres:17.8-amd64
    container_name: db-pg
    hostname: db-pg
    domainname: isahl.com
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    
    ports:
      - "5432:5432"
    
    networks:
      endpoint:
        ipv4_address: 172.30.10.254
    
    volumes:
      - type: bind
        source: ~/Services/db/postgresql17
        target: /var/lib/postgresql/data
    
    # ⚠️ 安全警告: 使用 .env 文件或环境变量设置密码
    # 创建 .env 文件: echo "POSTGRES_PASSWORD=$(openssl rand -base64 32)" > .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-chess}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?错误: 必须设置 POSTGRES_PASSWORD 环境变量}
      - POSTGRES_DB=${POSTGRES_DB:-isahl_9.x}
      # PGDATA 默认为 /var/lib/postgresql/data，与卷挂载路径一致
      - TZ=Asia/Shanghai
      - PGTZ=Asia/Shanghai
    
    # 健康检查
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess -d isahl_9.x"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    
    restart: no
    
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # ==========================================================================
  # Z-Chess Arena 节点 0 (主节点)
  # ==========================================================================
  raft10:
    build:
      context: ../..
      dockerfile: scripts/amd64/Dockerfile
      platforms:
        - linux/amd64
    image: img.z-chess.arena.amd64:2.0
    container_name: raft00
    hostname: raft00
    
    depends_on:
      db-pg:
        condition: service_healthy
    
    ports:
      - "8080:8080"    # HTTP API
      - "8000:8000"    # Debug
      - "1883:1883"    # MQTT
    
    networks:
      endpoint:
        ipv4_address: 172.30.10.110
      gate:
        ipv4_address: 172.30.11.110
    
    extra_hosts:
      - "raft00:172.30.10.110"
      - "raft01:172.30.10.111"
      - "raft02:172.30.10.112"
      - "gate00:172.30.11.110"
    
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0
      # 数据库配置与 application.properties 保持一致
      # postgresql.host=db-pg.isahl.com
      # postgresql.port=5432
      # postgresql.database=isahl_9.x
      - DB_HOST=db-pg.isahl.com
      - DB_PORT=5432
      - DB_NAME=isahl_9.x
      - TZ=Asia/Shanghai
    
    entrypoint: >
      sh -c "java $${JAVA_OPTS} 
      -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:8000 
      -jar /app/app.jar 
      --spring.profiles.active=$${SPRING_PROFILES_ACTIVE}"
    
    restart: no
    
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ==========================================================================
  # Z-Chess Arena 节点 1
  # ==========================================================================
  raft11:
    build:
      context: ../..
      dockerfile: scripts/amd64/Dockerfile
      platforms:
        - linux/amd64
    image: img.z-chess.arena.amd64:2.0
    container_name: raft01
    hostname: raft01
    
    depends_on:
      db-pg:
        condition: service_healthy
      raft10:
        condition: service_started
    
    ports:
      - "1884:1883"    # MQTT
      - "8100:8000"    # Debug
    
    networks:
      endpoint:
        ipv4_address: 172.30.10.111
    
    extra_hosts:
      - "raft00:172.30.10.110"
      - "raft01:172.30.10.111"
      - "raft02:172.30.10.112"
      - "gate00:172.30.11.110"
      - "db-pg.isahl.com:172.30.10.254"
    
    volumes:
      - type: bind
        source: ~/Z-Chess/raft01
        target: /root/Z-Chess
      - type: bind
        source: ~/Z-Chess/logs/raft01
        target: /app/logs
    
    environment:
      - SPRING_PROFILES_ACTIVE=online
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0
      # 数据库配置与 application.properties 保持一致
      # postgresql.host=db-pg.isahl.com
      # postgresql.port=5432
      # postgresql.database=isahl_9.x
      - DB_HOST=db-pg.isahl.com
      - DB_PORT=5432
      - DB_NAME=isahl_9.x
      - TZ=Asia/Shanghai
    
    entrypoint: >
      sh -c "java $${JAVA_OPTS} 
      -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:8000 
      -jar /app/app.jar 
      --spring.profiles.active=$${SPRING_PROFILES_ACTIVE}"
    
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    
    restart: no

  # ==========================================================================
  # Z-Chess Arena 节点 2
  # ==========================================================================
  raft12:
    build:
      context: ../..
      dockerfile: scripts/amd64/Dockerfile
      platforms:
        - linux/amd64
    image: img.z-chess.arena.amd64:2.0
    container_name: raft02
    hostname: raft02
    
    depends_on:
      db-pg:
        condition: service_healthy
      raft10:
        condition: service_started
    
    ports:
      - "1885:1883"    # MQTT
      - "2883:2883"    # TLS-MQTT
      - "8200:8000"    # Debug
    
    networks:
      endpoint:
        ipv4_address: 172.30.10.112
    
    extra_hosts:
      - "raft00:172.30.10.110"
      - "raft01:172.30.10.111"
      - "raft02:172.30.10.112"
      - "gate00:172.30.11.110"
      - "db-pg.isahl.com:172.30.10.254"
    
    volumes:
      - type: bind
        source: ~/Z-Chess/raft02
        target: /root/Z-Chess
      - type: bind
        source: ~/Z-Chess/logs/raft02
        target: /app/logs
    
    environment:
      - SPRING_PROFILES_ACTIVE=online
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0
      # 数据库配置与 application.properties 保持一致
      # postgresql.host=db-pg.isahl.com
      # postgresql.port=5432
      # postgresql.database=isahl_9.x
      - DB_HOST=db-pg.isahl.com
      - DB_PORT=5432
      - DB_NAME=isahl_9.x
      - TZ=Asia/Shanghai
    
    entrypoint: >
      sh -c "java $${JAVA_OPTS} 
      -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:8000 
      -jar /app/app.jar 
      --spring.profiles.active=$${SPRING_PROFILES_ACTIVE}"
    
    restart: no
    
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

# ============================================================================
# 网络配置
# ============================================================================
networks:
  endpoint:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.10.0/24
          gateway: 172.30.10.1
  
  gate:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.11.0/24
          gateway: 172.30.11.1

# ============================================================================
# 共享卷
# ============================================================================
volumes:
  postgres_data:
    driver: local
  postgres_logs:
    driver: local
