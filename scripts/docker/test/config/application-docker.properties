# Z-Chess Docker 环境统一配置文件
# 用于 Docker Compose 测试环境

# ==================== Server Configuration ====================
server.port=8080
spring.application.name=z-chess-arena

# ==================== Disable Spring Boot JPA Auto Config ====================
# 禁用 Spring Boot JPA 自动配置，使用 z.rook.dss 自定义配置
spring.data.jpa.repositories.enabled=false
spring.jpa.open-in-view=false

# ==================== Standard DataSource (for DatabaseHealthIndicator) ====================
spring.datasource.url=jdbc:postgresql://db-pg:5432/isahl_9.x
spring.datasource.username=chess
spring.datasource.password=chess123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# ==================== PostgreSQL Configuration (for z.rook.dss placeholders) ====================
postgresql.host=db-pg
postgresql.port=5432
postgresql.username=chess
postgresql.database=isahl_9.x

# ==================== Database Datasource (z.rook.dss) ====================
# Primary PostgreSQL DataSource
z.rook.dss[0].jpa.database=POSTGRESQL
z.rook.dss[0].jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
z.rook.dss[0].jpa.show-sql=false
z.rook.dss[0].jpa.generate-ddl=true
z.rook.dss[0].jpa.open-in-view=false
z.rook.dss[0].jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
z.rook.dss[0].jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
z.rook.dss[0].jpa.properties.hibernate.hbm2ddl.auto=update
z.rook.dss[0].jpa.properties.hibernate.enable_lazy_load_no_trans=true
z.rook.dss[0].jpa.properties.hibernate.format_sql=false
z.rook.dss[0].jpa.properties.hibernate.default_schema=isahl
z.rook.dss[0].jpa.properties.hibernate.auto_quote_keyword=true
z.rook.dss[0].jpa.properties.hibernate.identifier_quote_style=QUOTE
z.rook.dss[0].jpa.properties.hibernate.globally_quoted_identifiers=true
z.rook.dss[0].datasource.name=0
z.rook.dss[0].datasource.driver-class-name=org.postgresql.Driver
z.rook.dss[0].datasource.url=jdbc:postgresql://db-pg:5432/isahl_9.x
z.rook.dss[0].datasource.username=chess
z.rook.dss[0].datasource.password=chess123
z.rook.dss[0].sql-init.mode=always

# Secondary SQLite DataSource
z.rook.dss[1].jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
z.rook.dss[1].jpa.database=DEFAULT
z.rook.dss[1].jpa.show-sql=false
z.rook.dss[1].jpa.generate-ddl=true
z.rook.dss[1].jpa.open-in-view=false
z.rook.dss[1].jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
z.rook.dss[1].jpa.properties.hibernate.hbm2ddl.auto=update
z.rook.dss[1].jpa.properties.hibernate.format_sql=false
z.rook.dss[1].datasource.name=1
z.rook.dss[1].datasource.driver-class-name=org.sqlite.JDBC
z.rook.dss[1].datasource.url=jdbc:sqlite:/root/Z-Chess/z-chess.ds
z.rook.dss[1].datasource.username=
z.rook.dss[1].datasource.password=
z.rook.dss[1].sql-init.mode=always

# ==================== RAFT Cluster Configuration ====================
# 集群模式（3节点）
z.chess.raft.config.uid.type=3
z.chess.raft.cluster.nodes=raft00:172.30.10.110:2888,raft01:172.30.10.111:2889,raft02:172.30.10.112:2890
z.chess.raft.node.id=${NODE_ID:raft00}
z.chess.raft.port=${RAFT_PORT:2888}

# ==================== MQTT Configuration ====================
# MQTT TCP 端口
mqtt.server.port=1883
mqtt.server.tls.port=2883
mqtt.server.ws.port=8083

# MQTT v5 配置
z.chess.mqtt.v5.enabled=true
z.chess.mqtt.v5.topic-alias-enabled=true
z.chess.mqtt.v5.message-expiry-enabled=true
z.chess.mqtt.v5.flow-control-enabled=true
z.chess.mqtt.v5.shared-subscription-enabled=true
z.chess.mqtt.v5.server-receive-maximum=65535
z.chess.mqtt.v5.server-topic-alias-maximum=65535
z.chess.mqtt.v5.maximum-qos=2
z.chess.mqtt.v5.maximum-packet-size=268435455

# ==================== Logging Configuration ====================
logging.level.root=INFO
logging.level.com.isahl.chess=INFO
logging.level.org.springframework.jdbc=INFO
logging.file.name=/app/logs/z-chess.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ==================== Actuator Configuration ====================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator

# ==================== Jackson Configuration ====================
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.property-naming-strategy=SNAKE_CASE

# ==================== Actuator Health Configuration ====================
management.server.port=8080
management.endpoints.web.exposure.include=*
management.endpoint.health.enabled=true
management.endpoint.health.show-details=always
