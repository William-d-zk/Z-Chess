# Docker Environment Configuration
#

server.port=8080
server.ssl.enabled=false
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.parser.allow_single_quotes=true
spring.jackson.deserialization.fail_on_unknown_properties=true
spring.jackson.defaultPropertyInclusion=NON_EMPTY
spring.main.allow-bean-definition-overriding=true
spring.aop.proxy-target-class=false
spring.output.ansi.enabled=ALWAYS
spring.jpa.show-sql=false

# Database Configuration
postgresql.host=${POSTGRES_HOST:-db}
postgresql.port=${POSTGRES_PORT:-5432}
postgresql.username=${POSTGRES_USER:-chess}
postgresql.database=${POSTGRES_DB:-isahl_9.x}
postgresql.password=${POSTGRES_PASSWORD:-chess123}

# MQTT Configuration
mqtt.broker=tcp://localhost:1883
mqtt.username=
mqtt.password=
mqtt.client.id=z-chess-arena

# Logging
logging.level.com.isahl.chess=INFO
logging.level.org.springframework=INFO

# Health
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
