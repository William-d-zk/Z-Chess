# ============================================================================
# PostgreSQL 客户端认证配置文件 (pg_hba.conf)
# Z-Chess 集群专用配置
# ============================================================================

# 认证类型说明：
# - trust: 无需密码，直接连接（仅用于集群内部）
# - scram-sha-256: 密码认证（用于外部连接）
# - peer: 本地操作系统用户认证
# - reject: 拒绝连接

# =============================================================================
# 本地连接（Unix 域套接字）
# =============================================================================
# 本地连接使用 trust，方便容器内操作
local   all             all                                     trust

# =============================================================================
# 本地 TCP 连接 (127.0.0.1/32)
# =============================================================================
# 本地回环地址使用 trust
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust

# =============================================================================
# Z-Chess 集群内部网络 (Docker 网段)
# =============================================================================
# 集群网段 172.30.10.0/24 使用 trust，允许容器间免密通信
# 这是 Z-Chess Raft 集群的 endpoint 网络
host    all             all             172.30.10.0/24          trust
host    all             all             172.30.11.0/24          trust

# =============================================================================
# 其他内部网络（如有需要可添加）
# =============================================================================
# 示例：添加其他信任的网段
# host    all             all             10.0.0.0/8              trust
# host    all             all             192.168.0.0/16          trust

# =============================================================================
# 外部连接（需要密码认证）
# =============================================================================
# 其他所有连接使用 scram-sha-256 密码认证
host    all             all             0.0.0.0/0               scram-sha-256
host    all             all             ::/0                    scram-sha-256

# =============================================================================
# 复制连接配置（用于流复制）
# =============================================================================
# 复制连接也允许从集群网段访问
local   replication     all                                     trust
host    replication     all             127.0.0.1/32            trust
host    replication     all             172.30.10.0/24          trust
host    replication     all             172.30.11.0/24          trust
