# ============================================================================
# PostgreSQL 17 配置文件 - Z-Chess 优化版
# ============================================================================

# -----------------------------------------------------------------------------
# 连接和认证
# -----------------------------------------------------------------------------
listen_addresses = '*'
max_connections = 500                   # 根据容器内存调整，默认 100
superuser_reserved_connections = 10

# -----------------------------------------------------------------------------
# 内存配置（根据容器内存自动调整）
# -----------------------------------------------------------------------------
shared_buffers = 256MB                  # 推荐：总内存的 25%
effective_cache_size = 768MB            # 推荐：总内存的 75%
maintenance_work_mem = 64MB             # 维护操作内存
work_mem = 8MB                          # 排序/哈希操作内存
huge_pages = try                        # 尝试使用大页内存
dynamic_shared_memory_type = posix

# -----------------------------------------------------------------------------
# 预写式日志 (WAL)
# -----------------------------------------------------------------------------
wal_level = replica                     # 支持复制和备份
max_wal_size = 2GB                      # WAL 最大大小
min_wal_size = 512MB                    # WAL 最小大小
checkpoint_completion_target = 0.9      # 检查点完成目标
wal_buffers = 16MB                      # WAL 缓冲区
max_wal_senders = 10                    # 最大 WAL 发送者
max_replication_slots = 10              # 最大复制槽

# -----------------------------------------------------------------------------
# 查询优化器
# -----------------------------------------------------------------------------
default_statistics_target = 100
random_page_cost = 1.1                  # SSD 优化
effective_io_concurrency = 200          # 并发 IO 请求数

# -----------------------------------------------------------------------------
# 日志配置
# -----------------------------------------------------------------------------
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000       # 记录慢查询（1秒）
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0

# -----------------------------------------------------------------------------
# 时区和本地化
# -----------------------------------------------------------------------------
datestyle = 'iso, ymd'
timezone = 'Asia/Shanghai'
lc_messages = 'zh_CN.UTF-8'
lc_monetary = 'zh_CN.UTF-8'
lc_numeric = 'zh_CN.UTF-8'
lc_time = 'zh_CN.UTF-8'
default_text_search_config = 'pg_catalog.simple'

# -----------------------------------------------------------------------------
# 性能监控
# -----------------------------------------------------------------------------
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all
pg_stat_statements.max = 10000

# -----------------------------------------------------------------------------
# 自动清理
# -----------------------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50

# -----------------------------------------------------------------------------
# 并行查询（PostgreSQL 17 增强）
# -----------------------------------------------------------------------------
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4
parallel_tuple_cost = 0.1
parallel_setup_cost = 1000

# -----------------------------------------------------------------------------
# JIT 编译（PostgreSQL 17 改进）
# -----------------------------------------------------------------------------
jit = on
jit_above_cost = 100000
jit_inline_above_cost = 500000
jit_optimize_above_cost = 500000

# -----------------------------------------------------------------------------
# 包含额外配置
# -----------------------------------------------------------------------------
include_dir = '/etc/postgresql/conf.d'
