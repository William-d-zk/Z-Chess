# Z-Square Edge Agent Configuration
spring.application.name=z-square

# Edge node configuration
z.chess.square.nodeId=${NODE_ID:edge-node-001}
z.chess.square.scheduler-url=${SCHEDULER_URL:http://localhost:8080}
z.chess.square.heartbeat-interval=${HEARTBEAT_INTERVAL:30000}

# Server configuration
server.port=${EDGE_PORT:8090}

# Logging
logging.level.com.isahl.chess.square=INFO
logging.level.org.springframework=INFO
