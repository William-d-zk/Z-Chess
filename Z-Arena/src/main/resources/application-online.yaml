# Z-Chess 线上环境配置

server:
  port: 2808
  ssl:
    enabled: false

spring:
  profiles:
    active: online
  jackson:
    property-naming-strategy: SNAKE_CASE
    date-format: yyyy-MM-dd HH:mm:ss
    parser:
      allow_single_quotes: true
    deserialization:
      fail_on_unknown_properties: true
    default-property-inclusion: non_empty
  main:
    allow-bean-definition-overriding: true
  aop:
    proxy-target-class: false
  output:
    ansi:
      enabled: ALWAYS
  jpa:
    show-sql: false

# PostgreSQL 配置
postgresql:
  host: db-pg.isahl.com
  port: 5432
  username: chess
  database: isahl_9.x

# 外部服务配置
bidding:
  rpa:
    api:
      url: http://localhost:3000/reserve/query
  cancel:
    api:
      url: http://localhost:3000/reserve/cancel

# TLS/SSL 配置
z:
  chess:
    pawn:
      io:
        # 服务端 TLS 配置
        provider:
          ssl:
            enabled: ${SSL_ENABLED:false}
            key-store-path: ${SSL_KEYSTORE_PATH:/app/cert/server.p12}
            key-store-password: ${SSL_KEYSTORE_PASSWORD:changeit}
            trust-store-path: ${SSL_TRUSTSTORE_PATH:/app/cert/trust.p12}
            trust-store-password: ${SSL_TRUSTSTORE_PASSWORD:changeit}
            client-auth: ${SSL_CLIENT_AUTH:false}
            protocol: ${SSL_PROTOCOL:TLSv1.2}
        # 集群 TLS 配置
        cluster:
          ssl:
            enabled: ${CLUSTER_SSL_ENABLED:false}
            key-store-path: ${CLUSTER_KEYSTORE_PATH:/app/cert/cluster.p12}
            key-store-password: ${CLUSTER_KEYSTORE_PASSWORD:changeit}
            trust-store-path: ${CLUSTER_TRUSTSTORE_PATH:/app/cert/cluster-trust.p12}
            trust-store-password: ${CLUSTER_TRUSTSTORE_PASSWORD:changeit}
            client-auth: true
            protocol: TLSv1.2

# 日志配置
logging:
  level:
    root: WARN
    com.isahl.chess: INFO
    com.isahl.chess.knight.raft: DEBUG
