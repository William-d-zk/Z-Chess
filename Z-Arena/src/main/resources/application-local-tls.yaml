z:
  chess:
    pawn:
      io:
        provider:
          enabled: true
          # ⚠️ 安全警告: 使用环境变量设置密钥库路径和密码
          key-store-path: ${TLS_KEYSTORE_PATH:/Users/william.d.zk/z-chess-tls-test/server.p12}
          key-store-password: ${TLS_KEYSTORE_PASSWORD:?错误: 必须设置 TLS_KEYSTORE_PASSWORD 环境变量}
          trust-store-path: ${TLS_TRUSTSTORE_PATH:/Users/william.d.zk/z-chess-tls-test/trust.p12}
          trust-store-password: ${TLS_TRUSTSTORE_PASSWORD:?错误: 必须设置 TLS_TRUSTSTORE_PASSWORD 环境变量}
          client-auth: false
          protocol: TLSv1.2
        cluster:
          enabled: true
          # ⚠️ 安全警告: 使用环境变量设置集群密钥库路径和密码
          key-store-path: ${CLUSTER_KEYSTORE_PATH:/Users/william.d.zk/z-chess-tls-test/server.p12}
          key-store-password: ${CLUSTER_KEYSTORE_PASSWORD:?错误: 必须设置 CLUSTER_KEYSTORE_PASSWORD 环境变量}
          trust-store-path: ${CLUSTER_TRUSTSTORE_PATH:/Users/william.d.zk/z-chess-tls-test/trust.p12}
          trust-store-password: ${CLUSTER_TRUSTSTORE_PASSWORD:?错误: 必须设置 CLUSTER_TRUSTSTORE_PASSWORD 环境变量}
          client-auth: false
          protocol: TLSv1.2

spring:
  # ⚠️ 安全注意: H2 数据库已移除，请使用 PostgreSQL
  # 如需禁用数据库，设置: spring.datasource.url=
  datasource:
    # 使用 PostgreSQL 替代 H2 (安全修复)
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:zchess_test}
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER:chess}
    password: ${POSTGRES_PASSWORD:?错误: 必须设置 POSTGRES_PASSWORD 环境变量}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
  sql:
    init:
      mode: never

logging:
  level:
    root: INFO
    com.isahl.chess: INFO
    io.bishop.ssl: DEBUG
