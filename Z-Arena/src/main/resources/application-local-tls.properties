# TLS Test Profile - PostgreSQL Required
server.port=2808
server.ssl.enabled=false
spring.main.allow-bean-definition-overriding=true

# ⚠️ 安全注意: H2 数据库已移除，请使用 PostgreSQL
# 数据库配置 - PostgreSQL (H2 已移除，安全修复)
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:zchess_test}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER:chess}
# ⚠️ 安全警告: 必须设置 PostgreSQL 密码
spring.datasource.password=${POSTGRES_PASSWORD:?错误: 必须设置 POSTGRES_PASSWORD 环境变量}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never

# PostgreSQL config for local testing
postgresql.host=${POSTGRES_HOST:localhost}
postgresql.port=${POSTGRES_PORT:5432}
# ⚠️ 安全警告: 使用环境变量设置数据库密码，切勿硬编码
# 设置方式: export POSTGRES_USER=chess && export POSTGRES_PASSWORD=your_secure_password
postgresql.username=${POSTGRES_USER:chess}
postgresql.password=${POSTGRES_PASSWORD:?错误: 必须设置 POSTGRES_PASSWORD 环境变量}
postgresql.database=${POSTGRES_DB:zchess_test}

# Arena Web API Port
arena.port=8083

logging.level.root=INFO
logging.level.com.isahl.chess=INFO
