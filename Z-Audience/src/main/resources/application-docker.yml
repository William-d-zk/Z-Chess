# Z-Audience Docker 环境配置
#

server:
  port: 8081

spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
    date-format: yyyy-MM-dd HH:mm:ss
    parser:
      allow_single_quotes: true
    deserialization:
      fail_on_unknown_properties: true
    defaultPropertyInclusion: NON_EMPTY
  main:
    allow-bean-definition-overriding: true
    web-application-type: servlet
  output:
    ansi:
      enabled: ALWAYS
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  cache:
    type: jcache
    jcache:
      provider: org.ehcache.jsr107.EhcacheCachingProvider

# 管理端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# 日志配置
logging:
  level:
    com.isahl.chess.audience: INFO
    com.isahl.chess.king: WARN
    org.springframework: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Z-Audience 压测客户端配置
z:
  chess:
    audience:
      # MQTT 消费者配置
      qtt:
        name: ${AUDIENCE_NAME:audience-docker}
        host: ${TARGET_HOST:host.docker.internal}
        port: ${TARGET_PORT:1883}
      # WebSocket 配置
      ws:
        name: ${AUDIENCE_NAME:audience-docker}
        host: ${TARGET_HOST:host.docker.internal}
        port: ${TARGET_PORT_WS:1889}
        path: /mqtt
      # ZChat 配置
      chat:
        name: ${AUDIENCE_NAME:audience-docker}
        host: ${TARGET_HOST:host.docker.internal}
        port: ${TARGET_PORT_CHAT:1886}
      # IO 线程数
      io_count: ${IO_COUNT:3}

    # 压测配置
    pressure:
      target:
        host: ${PRESSURE_TARGET_HOST:host.docker.internal}
        port: ${PRESSURE_TARGET_PORT:1883}
        path: ${PRESSURE_TARGET_PATH:/mqtt}
      concurrency: ${PRESSURE_CONCURRENCY:1000}
      requests-per-second-per-client: ${PRESSURE_REQUESTS_PER_SECOND:10}
      connection-rate: ${PRESSURE_CONNECTION_RATE:50}
      duration: ${PRESSURE_DURATION:PT60S}
      warm-up-seconds: ${PRESSURE_WARM_UP_SECONDS:5}
      stats-interval: ${PRESSURE_STATS_INTERVAL:5}
      connect-timeout: ${PRESSURE_CONNECT_TIMEOUT:PT10S}
      request-timeout: ${PRESSURE_REQUEST_TIMEOUT:PT5S}
      keep-alive: ${PRESSURE_KEEP_ALIVE:true}
      heartbeat-interval: ${PRESSURE_HEARTBEAT_INTERVAL:30}
      protocol: ${PRESSURE_PROTOCOL:mqtt}
      payload-size: ${PRESSURE_PAYLOAD_SIZE:256}
      verbose: ${PRESSURE_VERBOSE:false}
