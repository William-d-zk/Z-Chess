# Pressure Test Configuration for Z-Audience

# ==================== Target Server Configuration ====================
# Target server host address
z.chess.pressure.target.host=127.0.0.1
# Target server port
z.chess.pressure.target.port=1883
# WebSocket path (for WebSocket protocol only)
z.chess.pressure.target.path=/mqtt

# ==================== Concurrency Configuration ====================
# Concurrent connections (max 5000 supported)
z.chess.pressure.concurrency=3000
# Requests per second per client
z.chess.pressure.requests-per-second-per-client=10
# Connection establishment rate (new connections per second)
z.chess.pressure.connection-rate=100

# ==================== Test Duration Configuration ====================
# Test duration in seconds
z.chess.pressure.duration=PT60S
# Warm-up time in seconds
z.chess.pressure.warm-up-seconds=5
# Statistics sampling interval in seconds
z.chess.pressure.stats-interval=5

# ==================== Timeout Configuration ====================
# Connection establishment timeout in seconds
z.chess.pressure.connect-timeout=PT10S
# Request timeout in seconds
z.chess.pressure.request-timeout=PT5S

# ==================== Heartbeat Configuration ====================
# Enable heartbeat to keep connection alive
z.chess.pressure.keep-alive=true
# Heartbeat interval in seconds
z.chess.pressure.heartbeat-interval=30

# ==================== Protocol Configuration ====================
# Protocol type: mqtt, websocket, zchat
z.chess.pressure.protocol=mqtt

# ==================== Message Configuration ====================
# Message payload size in bytes
z.chess.pressure.payload-size=256

# ==================== Logging Configuration ====================
# Enable verbose logging
z.chess.pressure.verbose=false
